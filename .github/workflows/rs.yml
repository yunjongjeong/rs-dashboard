name: RS 일일 갱신

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: RS 계산
        run: python rs/compute_rs.py --out data/rs.json

      - name: 결과 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rs.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "RS 자동 갱신: $(date -u +%Y-%m-%d)"
            git push
          fi
